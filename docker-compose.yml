version: '3.8'

services:
  # ========================================
  #  SQL Server Database
  # ========================================
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: chiller-plant-sqlserver
    hostname: sqlserver
    restart: unless-stopped
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${SQL_SERVER_SA_PASSWORD:-YourStrong!Passw0rd}
      - TZ=${TZ:-Asia/Shanghai}
      - MSSQL_PID=Express
      - MSSQL_AGENT_ENABLED=true
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
      - ./sqlserver/init:/docker-entrypoint-initdb.d
      - ./sqlserver/maintenance:/maintenance
    networks:
      - chiller-plant-net
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P '${SQL_SERVER_SA_PASSWORD:-YourStrong!Passw0rd}' -Q 'SELECT 1' -C || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ========================================
  #  Chiller Plant Backend Service
  # ========================================
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: chiller-plant-backend
    hostname: backend
    restart: unless-stopped
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
      - ASPNETCORE_URLS=http://+:8080
      - TZ=${TZ:-Asia/Shanghai}
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=${SQL_SERVER_DATABASE:-ChillerPlantDB};User Id=sa;Password=${SQL_SERVER_SA_PASSWORD:-YourStrong!Passw0rd};TrustServerCertificate=True;MultipleActiveResultSets=true;Connection Timeout=30;
      - APPLICATIONINSIGHTS_CONNECTION_STRING=${APPLICATIONINSIGHTS_CONNECTION_STRING:-}
      - AppSettings__DesignSystemCOP=5.5
      - AppSettings__AlarmLevel1DurationMinutes=10
      - AppSettings__AlarmLevel2DurationMinutes=30
      - AppSettings__OptimizationIntervalMinutes=60
      - AppSettings__DataReportIntervalSeconds=30
      - AppSettings__EnergyEfficiencyThreshold=0.7
      - AppSettings__SystemCOPAlarmThreshold=0.6
      - Wechat__Enabled=${WECHAT_ENABLED:-false}
      - Wechat__WebhookUrl=${WECHAT_WEBHOOK_URL:-}
      - Wechat__AggregateWindowSeconds=${WECHAT_AGGREGATE_WINDOW:-60}
      - BACnet__Port=${BACNET_PORT:-47808}
      - BACnet__LocalAddress=${BACNET_LOCAL_ADDRESS:-0.0.0.0}
      - BACnet__PollIntervalSeconds=${BACNET_POLL_INTERVAL:-30}
      - BACnet__DeviceIPs__0=simulator
      - BACnet__DeviceInstances__0=300001
      - BACnet__DeviceInstances__1=300002
      - BACnet__DeviceInstances__2=300003
      - BACnet__DeviceInstances__3=300004
      - BACnet__DeviceInstances__4=300005
      - Optimization__ModelWeightsPath=${OPTIMIZATION_MODEL_PATH:-/app/Data/neural_network_model.txt}
      - Optimization__AutoRetrainIntervalMinutes=${OPTIMIZATION_AUTO_RETRAIN:-300}
      - Optimization__EfficiencyCalcIntervalSeconds=${OPTIMIZATION_CALC_INTERVAL:-30}
    ports:
      - "5000:8080"
      - "47808:47808/udp"
    volumes:
      - backend-data:/app/Data
      - ./Backend/Data:/app/Data:ro
    networks:
      - chiller-plant-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ========================================
  #  BACnet Device Simulator
  # ========================================
  simulator:
    build:
      context: ./Simulator
      dockerfile: Dockerfile
    container_name: chiller-plant-simulator
    hostname: simulator
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - SIMULATOR_TARGET_ADDRESS=${SIMULATOR_TARGET_ADDRESS:-backend}
      - SIMULATOR_TARGET_PORT=${SIMULATOR_TARGET_PORT:-47808}
      - SIMULATOR_SEND_INTERVAL=${SIMULATOR_SEND_INTERVAL:-30}
      - SIMULATOR_CENTRIFUGAL_COUNT=${SIMULATOR_CENTRIFUGAL_COUNT:-3}
      - SIMULATOR_SCREW_COUNT=${SIMULATOR_SCREW_COUNT:-2}
      - SIMULATOR_COOLING_TOWER_COUNT=${SIMULATOR_COOLING_TOWER_COUNT:-8}
      - SIMULATOR_CHILLED_PUMP_COUNT=${SIMULATOR_CHILLED_PUMP_COUNT:-12}
      - SIMULATOR_COOLING_PUMP_COUNT=${SIMULATOR_COOLING_PUMP_COUNT:-12}
      - SIMULATOR_START_INSTANCE=${SIMULATOR_START_INSTANCE:-300001}
      - SIMULATOR_LOAD_FACTOR=${SIMULATOR_LOAD_FACTOR:-0.7}
      - SIMULATOR_AMBIENT_TEMP=${SIMULATOR_AMBIENT_TEMP:-28.0}
      - SIMULATOR_WET_BULB_TEMP=${SIMULATOR_WET_BULB_TEMP:-25.0}
      - SIMULATOR_RANDOM_NOISE=${SIMULATOR_RANDOM_NOISE:-0.05}
      - SIMULATOR_PERFORMANCE_CURVES=${SIMULATOR_PERFORMANCE_CURVES:-}
    networks:
      - chiller-plant-net
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep -v grep | grep -q 'BacnetSimulator' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ========================================
  #  Frontend (Nginx with Gzip)
  # ========================================
  frontend:
    image: nginx:alpine
    container_name: chiller-plant-frontend
    hostname: frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - chiller-plant-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# ========================================
#  Networks
# ========================================
networks:
  chiller-plant-net:
    driver: bridge
    name: chiller-plant-net
    ipam:
      config:
        - subnet: 172.28.0.0/16
          gateway: 172.28.0.1

# ========================================
#  Volumes
# ========================================
volumes:
  sqlserver-data:
    driver: local
    name: chiller-plant-sqlserver-data

  backend-data:
    driver: local
    name: chiller-plant-backend-data
